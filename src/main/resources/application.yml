spring:
  application:
    name: premisave-property-management-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/premisave-property}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: 8085

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-at-least-32-bytes-long}
  expiration: 86400000   # 24 hours in ms

app:
  api-key: ${INTERNAL_API_KEY:dev-key-change-in-prod}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.premisave.property: DEBUG
    org.springframework.data.mongodb: INFO